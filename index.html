<!DOCTYPE html>
<html>
<head>
  <script>
    // بيقرأ الـ brand ID من الـ query string
    const params = new URLSearchParams(window.location.search);
    const brandId = params.get('brandId');
    
    if (brandId) {
      window.location.href = `burando://brand/${brandId}`;
      setTimeout(() => {
        document.getElementById('msg').style.display = 'block';
      }, 2000);
    }
  </script>
</head>
<body>
  <p>جاري فتح التطبيق...</p>
  <p id="msg" style="display:none">يرجى تحميل تطبيق Burando أولاً</p>
</body>
</html>
